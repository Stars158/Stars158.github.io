<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的小说书架</title>
    <style>
        /* 全局样式 */
        body {
            background-color: #f5efe9;
            font-family: "微软雅黑", "PingFang SC", sans-serif;
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            font-size: 36px;
            color: #3e2c1b;
            border-bottom: 2px solid #d4c5b2;
            padding-bottom: 20px;
            margin-bottom: 40px;
        }
        /* 书架网格 */
        .bookshelf {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 30px;
        }
        /* 每本书的卡片 */
        .book-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            color: #333;
            display: block;
        }
        .book-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
        }
        /* 封面区域 - 你可以用图片，也可以用纯色+文字 */
        .cover {
            height: 300px;
            background: #d9c9b8; /* 默认底色 */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #5a4030;
            font-weight: bold;
            background-size: cover;
            background-position: center;
        }
        /* 如果你上传了图片，可以这样用： */
        /* .cover-a { background-image: url('cover_1.jpg'); } */
        .book-info {
            padding: 18px 20px 22px;
        }
        .book-title {
            font-size: 20px;
            font-weight: bold;
            margin: 0 0 8px 0;
            color: #2c1e12;
        }
        .book-desc {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
            margin: 0;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .book-status {
            display: inline-block;
            margin-top: 10px;
            font-size: 13px;
            background: #e8ddd0;
            padding: 2px 14px;
            border-radius: 20px;
            color: #5a4030;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 我的小说集</h1>
    <div class="bookshelf">

        <!-- ========== 小说 1 ========== -->
        <a href="novel1.html" class="book-card">
            <div class="cover" style="background-image: url('cover_1.jpg'); background-size: cover; background-position: center;"></div>
            <div class="book-info">
                <div class="book-title">你让我一个真理主义青年当魔法少女？</div>
                <div class="book-desc">自从天使入侵以后，一位自称魔法少女同好会的域外来客造访了地球...</div>
                <span class="book-status">连载中 · 36万字</span>
            </div>
        </a>

        <!-- ========== 小说 2 ========== -->
        <a href="novel2.html" class="book-card">
            <div class="cover" style="background-image: url('cover_2.jpg'); background-size: cover; background-position: center;"></div>
            <div class="book-info">
                <div class="book-title">重生猫猫的末日冒险日记</div>
                <div class="book-desc">20世纪40年代，本是个科技高度繁荣的时代，人工智能高度发展...</div>
                <span class="book-status">断更 · 16万字</span>
            </div>
        </a>

        <!-- ========== 小说 3 ========== -->
        <a href="novel3.html" class="book-card">
            <div class="cover" style="background-image: url('cover_3.jpg'); background-size: cover; background-position: center;"></div>
            <div class="book-info">
                <div class="book-title">智域</div>
                <div class="book-desc">这是2045年，一个充满无限可能的时代。高交互性具象化互联网——SIMI...</div>
                <span class="book-status">断更 · 3.7万字</span>
            </div>
        </a>


    </div>
</div>

</body>
</html>
